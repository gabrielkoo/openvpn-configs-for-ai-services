name: Update AI service IP ranges

on:
  schedule:
    # Weekly, Mondays 03:17 UTC (odd minute to dodge cron congestion)
    - cron: "17 3 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh IP ranges from Cloudflare Resource Library
        env:
          CF_APP_RO_KEY: ${{ secrets.CF_APP_RO_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: python3 scripts/update_ips.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: weekly refresh of AI service IP ranges"
            git push
            echo "pushed updated ranges"
          else
            echo "no changes to commit"
          fi
